{% extends 'base.html' %}

{% block title %}Новый пароль - HR Аналитика{% endblock %}

{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card auth-card p-4">
                    <div class="text-center mb-4">
                        <div class="bg-gradient-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 80px; height: 80px;">
                            <i class="bi bi-key" style="font-size: 2.5rem;"></i>
                        </div>
                        <h3 class="fw-bold mb-1">Новый пароль</h3>
                        <p class="text-muted">Придумайте новый пароль</p>
                    </div>

                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Новый пароль</label>
                            <input type="password" name="new_password1" class="form-control form-control-lg" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Подтвердите пароль</label>
                            <input type="password" name="new_password2" class="form-control form-control-lg" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 btn-custom mb-3">
                            <i class="bi bi-check-lg me-2"></i> Сохранить пароль
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
