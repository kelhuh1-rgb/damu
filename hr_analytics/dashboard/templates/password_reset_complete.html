{% extends 'base.html' %}

{% block title %}Пароль изменён - HR Аналитика{% endblock %}

{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card auth-card p-4 text-center">
                    <div class="bg-gradient-success text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 80px; height: 80px;">
                        <i class="bi bi-check-circle" style="font-size: 2.5rem;"></i>
                    </div>
                    <h3 class="fw-bold mb-3">Пароль изменён!</h3>
                    <p class="text-muted mb-4">Ваш пароль успешно обновлён. Теперь вы можете войти с новым паролем.</p>
                    <a href="{% url 'login' %}" class="btn btn-success btn-custom">
                        <i class="bi bi-box-arrow-in-right me-2"></i> Войти
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
