{% extends 'base.html' %}

{% block title %}Сброс пароля - HR Аналитика{% endblock %}

{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card auth-card p-4">
                    <div class="text-center mb-4">
                        <div class="bg-gradient-warning text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 80px; height: 80px;">
                            <i class="bi bi-envelope-open" style="font-size: 2.5rem;"></i>
                        </div>
                        <h3 class="fw-bold mb-1">Сброс пароля</h3>
                        <p class="text-muted">Введите email для получения инструкций</p>
                    </div>

                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Email</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-envelope text-muted"></i></span>
                                <input type="email" name="email" class="form-control form-control-lg" placeholder="your@email.com" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-warning w-100 btn-custom text-white mb-3">
                            <i class="bi bi-send me-2"></i> Отправить инструкции
                        </button>
                    </form>

                    <div class="text-center">
                        <a href="{% url 'login' %}" class="text-decoration-none text-muted">
                            <i class="bi bi-arrow-left me-1"></i> Вернуться к входу
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
